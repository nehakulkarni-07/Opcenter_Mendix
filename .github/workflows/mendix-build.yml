name: Opcenter Mendix CI - Build and Deploy Local

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_NAME: Opcenter_EXCR_MX_Core_2510_1_0_0001
  MENDIX_VERSION: 10.24.4.77222
  VERSION: 1.0.0
  DEPLOY_DIR: C:\Program Files (x86)\Camstar\Mendix Solutions\MDA\Core

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build the .mda with MxBuild
        shell: cmd
        run: |
          set MXBUILD="C:\Program Files\Mendix\10.24.4.77222\modeler\mxbuild.exe"
          set JAVA="C:\Program Files\Microsoft\jdk-21.0.10.7-hotspot\bin\java.exe"
          set JAVAHOME="C:\Program Files\Microsoft\jdk-21.0.10.7-hotspot"
          if not exist releases mkdir releases
          echo N | %MXBUILD% --target=package ^
            --output=releases\%APP_NAME%-%VERSION%-build%GITHUB_RUN_NUMBER%.mda ^
            --java-home=%JAVAHOME% ^
            --java-exe-path=%JAVA% ^
            %APP_NAME%.mpr

      - name: Validate build output
        shell: cmd
        run: if not exist releases\*.mda ( echo BUILD FAILED & exit 1 )

      - name: Upload .mda artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-mda-${{ github.run_number }}
          path: releases/*.mda
          retention-days: 30

      - name: Backup existing .mda
        shell: cmd
        run: |
          if not exist "%DEPLOY_DIR%\backup" mkdir "%DEPLOY_DIR%\backup"
          for %%f in ("%DEPLOY_DIR%\*.mda") do (
            echo Backing up %%~nxf
            move "%%f" "%DEPLOY_DIR%\backup\%%~nf-backup-%GITHUB_RUN_NUMBER%.mda"
          )

      - name: Replace with new .mda
        shell: cmd
        run: |
          echo Copying new build to deployment folder...
          copy "releases\%APP_NAME%-%VERSION%-build%GITHUB_RUN_NUMBER%.mda" "%DEPLOY_DIR%\%APP_NAME%.mda"
          echo Deployment folder contents:
          dir "%DEPLOY_DIR%"

      - name: Restart Mendix App
        shell: cmd
        run: |
          echo Restarting Mendix application...
          tasklist | findstr /i "mxruntime"
          if errorlevel 1 (
            echo No running mxruntime process found.
          ) else (
            echo Stopping existing mxruntime process...
            taskkill /F /IM mxruntime.exe
          )
          echo Restart step completed (placeholder - configure mxruntime path)
          exit /b 0