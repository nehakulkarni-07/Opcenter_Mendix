<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		</head>
		<body>
			<div class="app-form">
				<form id="loginForm" autocomplete="off">
					<div class="login-header">
						<img class="-responsive " src="http://localhost:8080/img/Atlas_Core$Layout$logo.svg?637698165103926839" role="presentation"/>
						<h3>OP EX SM</h3>
					</div>
					<div>
						<div id="loginMessage" class="alert alert-danger"/>
						<div class="form-group">
							<label class="control-label" id="usernameLabel" for="usernameInput">User
                                                        name</label>
							<div class="inputwrapper">
								<input id="usernameInput" class="form-control" type="text" placeholder="User name" autocorrect="off" autocapitalize="none" autocomplete="off"/>
							</div>
						</div>
						<div class="form-group">
							<label class="control-label" id="passwordLabel" for="passwordInput">Password</label>
							<div class="inputwrapper">
								<input id="passwordInput" class="form-control" type="password" placeholder="Password" autocorrect="off" autocapitalize="none" autocomplete="off"/>
							</div>
						</div>
						<div class="form-toolbar">
							<button id="loginSSOButton" type="submit" class="btn btn-default">
                                                        Sign in with SSO
                                                    </button>
							<span class="text-divider">or</span>
							<button id="loginButton" type="submit" class="btn btn-primary">
                                                        Sign in
                                                    </button>
						</div>
					</div>
				</form>
				<div class="login-footer">
					<a class="mx-link" href="#" role="button" title="" data-button-id="50.DISWAtlasWorkspace.Login.actionButton1" data-disabled="false">
                                                Forgot password</a>
					<a class="mx-link mx-name-actionButton2" href="#" role="button" title="" data-button-id="50.DISWAtlasWorkspace.Login.actionButton2" data-disabled="false">
                                                Create new account</a>
				</div>
			</div>
		</body>
	</html>
