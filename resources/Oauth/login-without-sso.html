<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
		<title>OAUTH MODULE</title>
		<!--<meta http-equiv="refresh" content="0; url=signin">-->
        <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1, maximum-scale=1">
        <meta name="apple-mobile-web-app-capable" content="yes">

        {{themecss}}

        <!-- ICONS EXAMPLE -->

        <!-- iPhone retina icon (iOS < 7) -->
        <!-- <link href="resources/ios/icons/apple-touch-icon-precomposed-114x114.png" sizes="114x114" rel="apple-touch-icon-precomposed"> -->

        <!-- STARTUP IMAGES -->
        <!-- <link href="resources/ios/startup/apple-touch-startup-image-1496x2048.png" media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)" rel="apple-touch-startup-image"> -->

	</head>
	<body>
        <div class="leftpane">
            <h1>OAUTH MODULE</h1>
        </div>
        <div class="rightpane">
            <div class="rightpane-header"> </div>
            <div class="loginpage-right">
                <div class="loginpage-formwrapper">
                    <h2>Sign in to </h2>
                    <form id="loginForm" class="loginpage-form" autocomplete="off">
                        <div>
                            <div id="loginMessage" class="alert alert-danger"></div>
                            <div class="form-group">
                                <label class="control-label" id="usernameLabel" for="usernameInput">User name</label>
                                <div class="inputwrapper">
                                    <input
                                        id="usernameInput"
                                        class="form-control"
                                        type="text"
                                        placeholder="User name"
                                        autocorrect="off"
                                        autocapitalize="none"
                                        autocomplete="off"
                                    />
                                    <span class="glyphicon glyphicon-user"></span>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label" id="passwordLabel" for="passwordInput">Password</label>
                                <div class="inputwrapper">
                                    <input
                                        id="passwordInput"
                                        class="form-control"
                                        type="password"
                                        placeholder="Password"
                                        autocorrect="off"
                                        autocapitalize="none"
                                        autocomplete="off"
                                    />
                                    <span class="glyphicon glyphicon-eye-close" onClick="togglePassword()"></span>
                                </div>
                            </div>
                            <button id="loginButton" type="submit" class="btn btn-success btn-lg">Sign in</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
		<div class="bottomPane">
            <div class="footerPane">
            </div>
        </div>
	<script>
        dojoConfig = {
            isDebug: false,
            rtlRedirect: "index-rtl.html",
            baseUrl: "mxclientsystem/dojo/",
            cacheBust: "{{cachebust}}"
        };
    </script>
		<script src="js/login_i18n.js?{{cachebust}}"></script>
		<script src="js/login.js?{{cachebust}}"></script>
	</body>
</html>


        <script src="js/login_i18n.js?{{ cachebust }}"></script>
        <script src="js/login.js?{{ cachebust }}"></script>
        <script>
            function togglePassword() {
                const icon = document.querySelector('[class*=glyphicon-eye]');
                if (icon.classList.contains('glyphicon-eye-close'))
                    icon.classList.replace('glyphicon-eye-close', 'glyphicon-eye-open');
                else icon.classList.replace('glyphicon-eye-open', 'glyphicon-eye-close');

                const input = document.querySelector('#passwordInput');
                if (input.type === 'password') input.type = 'text';
                else input.type = 'password';
            }
        </script>
    </body>
</html>
